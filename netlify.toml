[build]
  # NODE_ENV=production aplicado SOLO al `pnpm build` (no al install).
  # Si lo seteamos como env global, pnpm install salta devDependencies
  # (tailwindcss, vitest, etc.) y el build falla con "Can't resolve
  # 'tailwindcss'". Inline en el command sortea ese conflicto.
  command = "NODE_ENV=production pnpm build"
  publish = ".next"

[build.environment]
  # Pin pnpm a la versión del lockfile para que Netlify use exactamente
  # la misma resolución de deps que en local.
  PNPM_VERSION = "10.8.0"

# Plugin oficial de Next.js: rutea middleware, RSC, SSR y route handlers
# como Edge / Serverless Functions. Sin esto, el deploy queda estático
# y el middleware no corre — la redirect / → /<locale> nunca dispara y
# todas las URLs raíz devuelven 404.
[[plugins]]
  package = "@netlify/plugin-nextjs"
